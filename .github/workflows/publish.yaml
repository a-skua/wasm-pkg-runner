name: Publish
run-name: Publish ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
      - run: deno check main.ts
      - run: deno publish

  release:
    needs: publish
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - run: gh release create "$TAG" --generate-notes --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
